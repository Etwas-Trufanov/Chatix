<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C4DFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#bgGradient)"/>
  
  <!-- Antenna -->
  <line x1="256" y1="100" x2="256" y2="200" stroke="#E8E8E8" stroke-width="8"/>
  <circle cx="256" cy="90" r="15" fill="#FFFFFF"/>
  
  <!-- Ears/Headphones -->
  <ellipse cx="120" cy="250" rx="35" ry="70" fill="#FFFFFF"/>
  <ellipse cx="392" cy="250" rx="35" ry="70" fill="#FFFFFF"/>
  
  <!-- Robot head (speech bubble shape) -->
  <path d="M 140 180 Q 140 160 170 160 L 342 160 Q 372 160 372 180 L 372 320 Q 372 350 342 360 L 200 360 L 170 390 L 170 360 Q 140 350 140 320 Z" 
        fill="#FFFFFF"/>
  
  <!-- Face screen -->
  <rect x="165" y="185" width="182" height="145" rx="25" fill="#1A237E"/>
  
  <!-- Eyes with glow effect -->
  <g filter="url(#glow)">
    <path d="M 200 240 Q 215 225 230 240" stroke="#00E5FF" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 282 240 Q 297 225 312 240" stroke="#00E5FF" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Smile with glow effect -->
  <g filter="url(#glow)">
    <path d="M 220 280 Q 256 310 292 280" stroke="#00E5FF" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
